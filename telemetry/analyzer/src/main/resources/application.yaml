server:
  port: 0

spring:
  application:
    name: analyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/analyzer
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: localhost:9092

analyzer:
  kafka:
    consumer-groups:
      hubs: analyzer-hubs
      snapshots: analyzer-snapshots

    topics:
      hubs: telemetry.hubs.v1
      snapshots: telemetry.snapshots.v1

grpc:
  client:
    hub-router:
      address: static://localhost:59090
      negotiationType: plaintext